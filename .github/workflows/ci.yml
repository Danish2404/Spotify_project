name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Install Backend dependencies
        run: |
          cd Backend
          npm ci

      - name: Run Backend tests
        run: |
          cd Backend
          npm test

      - name: Install Frontend dependencies
        run: |
          cd Frontend
          npm ci

      - name: Run Frontend tests
        run: |
          cd Frontend
          npm test